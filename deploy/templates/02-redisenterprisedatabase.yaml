{{- if .Values.redis.enabled }}
apiVersion: app.redislabs.com/v1alpha1
kind: RedisEnterpriseDatabase
metadata:
  name: {{ .Values.redis.database.name }}
  labels:
    app: redis-enterprise
    app.kubernetes.io/managed-by: tenant-a-apps
    platform.ocp-gitops.io/tenant: tenant-a
spec:
  redisEnterpriseCluster:
    name: {{ .Values.redis.rec.name }}
  memorySize: {{ .Values.redis.database.memorySize }}
  tlsMode: {{ .Values.redis.database.tlsMode }}
{{- end }}
